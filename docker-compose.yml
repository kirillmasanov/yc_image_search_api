services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ROOT_PATH=${ROOT_PATH:-}
    command: >
      uv run uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --root-path ${ROOT_PATH:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
