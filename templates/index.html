<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поиск по изображению</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="container">
    <h1>Поиск по изображению</h1>

    <form id="searchForm">
      <div class="upload-area" id="uploadArea">
        <input type="file" id="fileInput" accept="image/*" hidden>
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <p>Перетащите изображение сюда<br>или <button type="button" id="browseBtn">выберите файл</button></p>
        <p id="fileName" class="file-name"></p>
      </div>

      <div class="divider"><span>или</span></div>

      <div class="form-group">
        <label for="imageUrl">Ссылка на изображение</label>
        <input type="url" id="imageUrl" placeholder="https://example.com/image.jpg">
      </div>

      <div class="form-group">
        <label for="siteFilter">Домен для поиска <span class="optional">(необязательно)</span></label>
        <input type="text" id="siteFilter" placeholder="example.com">
      </div>

      <button type="submit" id="searchBtn">Поиск</button>
    </form>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <span>Идёт поиск...</span>
    </div>

    <div id="errorMsg" class="error hidden"></div>

    <div id="tabSection" class="tab-section hidden">
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="results">Результаты <span id="tabResultsCount" class="tab-count"></span></button>
        <button class="tab-btn" data-tab="request">Request</button>
        <button class="tab-btn" data-tab="response">Response</button>
      </div>

      <div id="tabResults" class="tab-panel">
        <div id="results" class="results-grid"></div>
      </div>

      <div id="tabRequest" class="tab-panel hidden">
        <pre id="debugRequest" class="json-pre"></pre>
      </div>

      <div id="tabResponse" class="tab-panel hidden">
        <pre id="debugResponse" class="json-pre"></pre>
      </div>
    </div>
  </div>

  <script src="/static/js/main.js"></script>
</body>
</html>
